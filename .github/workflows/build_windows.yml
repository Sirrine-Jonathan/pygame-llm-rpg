name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # Also allows manual trigger from GitHub UI

permissions:
  contents: write   # required to create releases and upload assets

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame requests pyinstaller

      - name: Build Windows .exe with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --add-data "assets;assets" `
            --name "Vault404_RPG" `
            main.py

      - name: Verify build output
        run: |
          dir dist\
          if (!(Test-Path "dist\Vault404_RPG.exe")) {
            Write-Error "Build failed: Vault404_RPG.exe not found!"
            exit 1
          }
          Write-Host "Build successful! Vault404_RPG.exe is ready."

      - name: Upload .exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vault404_RPG_Windows
          path: dist/Vault404_RPG.exe
          retention-days: 30

      - name: Upload .exe to GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Vault404_RPG.exe
          fail_on_unmatched_files: true
